<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm đường - Bản đồ Học viện Ngân hàng</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/pages/ban-do/tim-duong.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="main-content-wrapper">
        <div class="container">
            <h2 class="page-title">
                TÌM ĐƯỜNG TRONG TRƯỜNG
            </h2>

            <div class="controls">
                <select id="start" class="select-box">
                    <option value="">-- Chọn điểm xuất phát --</option>
                </select>
                <i class="fas fa-arrow-right" style="color: #999; margin: 0 10px;"></i>
                <select id="end" class="select-box">
                    <option value="">-- Chọn điểm đến --</option>
                </select>
                <button id="btnFind" class="btn-find">
                    <i class="fas fa-search-location"></i> DẪN ĐƯỜNG
                </button>
            </div>

            <div id="videoSection" class="video-container" style="display: none;">
                <h3 class="video-title"><i class="fas fa-video"></i> MÔ PHỎNG THỰC TẾ</h3>

                <div class="video-layout">
                    
                    <div class="video-wrapper">
                        <video id="guideVideo" class="guide-video" muted playsinline>
                            <source src="" type="video/mp4">
                        </video>
                        <div id="instructionText" class="instruction-overlay">Đi thẳng</div>
                    </div>

                    <div class="speed-controls">
                        <span>Tốc độ</span>
                        <button onclick="setSpeed(0.5)">0.5x</button>
                        <button onclick="setSpeed(1.0)" class="active-speed">1.0x</button>
                        <button onclick="setSpeed(1.5)">1.5x</button>
                        <button onclick="setSpeed(2.0)">2.0x</button>
                        <button onclick="setSpeed(4.0)">4.0x</button>
                        <button onclick="setSpeed(10.0)">10.0x</button>
                    </div>

                </div>
                <p id="videoError" style="color: #d9534f; display: none; margin-top: 10px; font-weight: bold;"></p>
            </div>

            <div class="map-box">
                <img src="../../assets/images/pages/ban-do/chung/map.drawio.png" alt="Sơ đồ trường HVNH">
                <canvas id="mapCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        loadHeader('../..', 'ban-do');
        loadFooter('../..');
    </script>

    <script src="../../js/services/api.js"></script>
    <script src="../../js/controllers/ban-do/tim-duong/dijkstra.js"></script>
    <script src="../../js/controllers/ban-do/tim-duong/ve-map.js"></script>
    <script src="../../js/controllers/ban-do/tim-duong/tim-duong.js"></script>

</body>

</html>
